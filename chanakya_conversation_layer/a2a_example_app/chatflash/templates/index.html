<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar panel">
        <div class="brand">
          <p class="eyebrow">Simple Web Chat</p>
          <h1>{{ app_name }}</h1>
          <p class="lede">A small MAF chat UI. By default it uses `A2AAgent` to talk to OpenCode.</p>
        </div>

        <button id="new-session" class="primary-button">New Conversation</button>

        <section class="meta-block">
          <p class="meta-label">Active MAF backend</p>
          <p class="meta-value">{{ active_backend }}</p>
        </section>

        <section class="meta-block">
          <p class="meta-label">A2A bridge</p>
          <p class="meta-value">{{ opencode_a2a_url }}</p>
        </section>

        <section>
          <div class="section-title">Sessions</div>
          <div id="sessions-list" class="session-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <header class="chat-header panel">
          <div>
            <p class="eyebrow">Current Session</p>
            <h2 id="session-title"></h2>
          </div>
          <label class="agent-picker">
            <span>Agent</span>
            <select id="agent-select"></select>
          </label>
        </header>

        <section class="chat-card panel">
          <div id="flash-error" class="error-banner hidden"></div>
          <div id="chat-transcript" class="chat-transcript"></div>

          <form id="composer" class="composer">
            <textarea
              id="message-input"
              name="message"
              rows="4"
              placeholder="Send a message to the selected OpenCode agent..."
            ></textarea>
            <div class="composer-actions">
              <p class="composer-hint">Shift+Enter for newline</p>
              <button type="submit" class="primary-button">Send</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script>
      window.__CHATFLASH__ = {
        sessions: {{ sessions | tojson }},
        selectedSession: {{ selected_session | tojson }},
        messages: {{ messages | tojson }},
        agents: {{ agents | tojson }},
      };
    </script>
    <script src="{{ url_for('static', path='app.js') }}"></script>
  </body>
  </html>
