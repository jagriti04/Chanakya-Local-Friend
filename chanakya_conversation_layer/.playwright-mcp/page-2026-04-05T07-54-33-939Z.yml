              - generic [ref=e74]:
                - paragraph [ref=e75]:
                  - text: Currently, I am a postdoctoral researcher at Aravamuthan Lab, WashU. I am working on developing intelligent systems for quantifying motor disorders in children with Dystonic Cerebral Palsy under the supervision of
                  - link "Dr. Bhooma Aravamuthan" [ref=e76] [cursor=pointer]:
                    - /url: https://aravamuthanlab.wustl.edu/
                  - text: . I am interested in multi-disciplinary approaches to solving real-world problems. Before joining Aravamuthan Lab I worked at IIT Delhi and AIIMS Delhi as a Prime Minister’s Research Fellow (PMRF) under the supervision of
                  - link "Dr. Deepak Joshi" [ref=e77] [cursor=pointer]:
                    - /url: https://web.iitd.ac.in/~joshid/
                  - text: for my PhD degree. There, I developed tools for gait kinematics measurement, automated gait assessment, and detecting abnormalities in different parts of the body such as knee joint abnormalities (osteoarthritis quantification), respiration abnormalities, and lower limb abnormalities while walking.
                - paragraph [ref=e78]:
                  - text: During the final year of my B.Tech, I worked at IISc, Bangalore with
                  - link "Dr. Sridharan Devarajan" [ref=e79] [cursor=pointer]:
                    - /url: https://cns.iisc.ac.in/sridhar/index.html
                  - text: to understand how exogenous attention modulates visual working memory in humans. Working on understanding cognitive processes taught me new scientific methods of research. My interest in mechatronics developed at IIIT Jabalpur and IIT Kanpur where I developed various robotic systems under the supervision of
                  - link "Dr. Bishakh Bhattacharya" [ref=e80] [cursor=pointer]:
                    - /url: https://www.iitk.ac.in/smss/author/prof.-bishakh-bhattacharya/#:~:text=Bishakh%20Bhattacharya%20is%20a%20Professor,Engineering%20at%20IIT%20Kanpur%2C%20India.
                  - text: and the faculties of
                  - link "IIIT Jabalpur." [ref=e81] [cursor=pointer]:
                    - /url: http://faculty.iiitdmj.ac.in/
                - paragraph [ref=e82]: In my spare time, I enjoy doing outdoor activities, watching movies, and reading fitness blogs.
