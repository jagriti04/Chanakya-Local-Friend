name: Setup and Test

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # Speaches container is started during the steps to allow for model caching
    

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Speaches Models
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ runner.os }}-speaches-models
          restore-keys: |
            ${{ runner.os }}-speaches-models

      - name: Start Speaches Container
        run: |
          mkdir -p models
          chmod 777 models
          
          docker run -d --name speaches -p 8000:8000 \
            -e HUGGINGFACE_HUB_CACHE=/models \
            -e HF_HOME=/models \
            -v ${{ github.workspace }}/models:/models \
            ghcr.io/speaches-ai/speaches:0.7.0-cpu
          
          # Wait for the container to become responsive to avoid initial connection errors
          timeout 60 bash -c 'until curl -s http://localhost:8000/v1/models > /dev/null; do sleep 2; done'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ffmpeg
          version: 1.0

      - name: Install Python dependencies
        id: setup
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          # Run core tests assuming unit level
          python -m pytest tests/ -v --ignore=tests/test_audio_service.py

      - name: Run Integration Tests
        if: (success() || failure()) && steps.setup.outcome == 'success'
        env:
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY || 'ci-test-secret' }}
          DATABASE_PATH: ":memory:"
          LLM_PROVIDER: "ollama"
          TTS_PROVIDER: "openai"
          STT_PROVIDER: "openai"
          TTS_BASE_URL: "http://localhost:8000/v1"
          STT_BASE_URL: "http://localhost:8000/v1"
          TTS_API_KEY: ${{ secrets.TTS_API_KEY || 'dummy-key' }}
          STT_API_KEY: ${{ secrets.STT_API_KEY || 'dummy-key' }}
        run: |
          # Execute tests that might interact with the external Speaches container
          # Currently, this runs all tests, but as the suite grows, you may
          # restrict this to a specific directory or use pytest markers (e.g., -m integration)
          python -m pytest tests/test_audio_service.py -v

      - name: Fix cache permissions
        if: always()
        run: sudo chown -R $USER models
