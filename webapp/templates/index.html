<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chanakya MAF MVP</title>
    <style>
      :root {
        --bg: #f4f6f9;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0069c2;
        --ok: #0f766e;
        --warn: #b45309;
        --fail: #b91c1c;
      }
      body {
        margin: 0;
        font-family: "Source Sans 3", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #eef4ff 0%, var(--bg) 45%);
      }
      .layout {
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        gap: 16px;
        max-width: 1280px;
        margin: 0 auto;
        padding: 18px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid #dbe3ee;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(3, 23, 53, 0.05);
      }
      .chat-panel {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 36px);
      }
      .panel-header {
        padding: 14px 16px;
        border-bottom: 1px solid #e6edf5;
      }
      .panel-header h2 {
        margin: 0;
        font-size: 18px;
      }
      .panel-header p {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .chat-log {
        flex: 1;
        overflow: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        padding: 10px 12px;
        border-radius: 10px;
        max-width: 90%;
        line-height: 1.35;
      }
      .msg.user {
        align-self: flex-end;
        background: #dbeafe;
      }
      .msg.assistant {
        align-self: flex-start;
        background: #eef2ff;
      }
      .meta {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .composer {
        border-top: 1px solid #e6edf5;
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      input[type="text"] {
        width: 100%;
        border: 1px solid #c7d5e5;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
      }
      button {
        border: 0;
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 0 16px;
        font-size: 14px;
        cursor: pointer;
      }
      .trace-panel {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 12px;
        height: calc(100vh - 36px);
      }
      .trace-body {
        overflow: auto;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .event {
        border: 1px solid #e0e7ef;
        border-left: 4px solid #9ca3af;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 13px;
      }
      .event.ok { border-left-color: var(--ok); }
      .event.warn { border-left-color: var(--warn); }
      .event.fail { border-left-color: var(--fail); }
      .event-head {
        display: flex;
        justify-content: space-between;
        gap: 6px;
        font-weight: 600;
      }
      .event pre {
        white-space: pre-wrap;
        margin: 6px 0 0;
        color: #374151;
      }
      @media (max-width: 980px) {
        .layout { grid-template-columns: 1fr; }
        .chat-panel, .trace-panel { height: auto; }
        .chat-panel { min-height: 65vh; }
        .trace-panel { grid-template-rows: auto auto; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="panel chat-panel">
        <div class="panel-header">
          <h2>Chanakya Chat</h2>
          <p>Single assistant entrypoint with route/tool/delegation behavior.</p>
        </div>
        <div id="chatLog" class="chat-log"></div>
        <form id="chatForm" class="composer">
          <input id="messageInput" type="text" placeholder="Ask Chanakya anything..." required />
          <button type="submit">Send</button>
        </form>
      </section>

      <section class="trace-panel">
        <div class="panel">
          <div class="panel-header">
            <h2>Execution Trace</h2>
            <p>Route decisions, tool calls, delegation events, and runtime status.</p>
          </div>
          <div id="events" class="trace-body"></div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h2>Task State Timeline</h2>
            <p>Parent + child transitions from the persistent task store.</p>
          </div>
          <div id="taskTimeline" class="trace-body"></div>
        </div>
      </section>
    </div>

    <script>
      const chatForm = document.getElementById("chatForm");
      const messageInput = document.getElementById("messageInput");
      const chatLog = document.getElementById("chatLog");
      const eventsPanel = document.getElementById("events");
      const taskTimeline = document.getElementById("taskTimeline");

      let pendingFollowupRequestId = null;
      let currentRequestId = null;
      let currentTaskId = null;
      let pollTimer = null;

      function appendMessage(kind, text, meta) {
        const wrap = document.createElement("div");
        wrap.className = `msg ${kind}`;
        wrap.textContent = text;
        if (meta) {
          const small = document.createElement("div");
          small.className = "meta";
          small.textContent = meta;
          wrap.appendChild(small);
        }
        chatLog.appendChild(wrap);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function clearNode(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      function statusClass(raw) {
        const text = (raw || "").toLowerCase();
        if (text.includes("fail") || text.includes("error")) return "fail";
        if (text.includes("block") || text.includes("wait")) return "warn";
        return "ok";
      }

      function renderEvents(events) {
        clearNode(eventsPanel);
        if (!events.length) {
          eventsPanel.textContent = "No trace events yet.";
          return;
        }
        events.forEach((event) => {
          const card = document.createElement("div");
          card.className = `event ${statusClass(event.event_type)}`;

          const head = document.createElement("div");
          head.className = "event-head";
          const left = document.createElement("span");
          left.textContent = event.event_type;
          const right = document.createElement("span");
          right.textContent = new Date(event.timestamp).toLocaleTimeString();
          head.appendChild(left);
          head.appendChild(right);

          const body = document.createElement("pre");
          body.textContent = JSON.stringify(event.payload, null, 2);

          card.appendChild(head);
          card.appendChild(body);
          eventsPanel.appendChild(card);
        });
      }

      function renderTask(task) {
        clearNode(taskTimeline);
        if (!task) {
          taskTimeline.textContent = "No task selected.";
          return;
        }
        const parent = document.createElement("div");
        parent.className = `event ${statusClass(task.status)}`;
        parent.innerHTML = `<div class="event-head"><span>Parent ${task.id}</span><span>${task.status}</span></div>`;
        const parentBody = document.createElement("pre");
        parentBody.textContent = task.transitions.map((t) => `${t.timestamp}: ${t.from_status} -> ${t.to_status} (${t.reason})`).join("\n");
        parent.appendChild(parentBody);
        taskTimeline.appendChild(parent);

        (task.children || []).forEach((child) => {
          const card = document.createElement("div");
          card.className = `event ${statusClass(child.status)}`;
          card.innerHTML = `<div class="event-head"><span>${child.owner} (${child.id})</span><span>${child.status}</span></div>`;
          const childBody = document.createElement("pre");
          childBody.textContent = child.transitions.map((t) => `${t.timestamp}: ${t.from_status} -> ${t.to_status} (${t.reason})`).join("\n");
          card.appendChild(childBody);
          taskTimeline.appendChild(card);
        });
      }

      async function poll() {
        if (!currentRequestId) return;

        const params = new URLSearchParams();
        params.set("request_id", currentRequestId);
        if (currentTaskId) params.set("task_id", currentTaskId);

        const eventsRes = await fetch(`/api/events?${params.toString()}`);
        const eventsData = await eventsRes.json();
        renderEvents(eventsData.events || []);

        if (currentTaskId) {
          const taskRes = await fetch(`/api/tasks/${currentTaskId}`);
          if (taskRes.ok) {
            const taskData = await taskRes.json();
            renderTask(taskData);
          }
        }
      }

      function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        poll();
        pollTimer = setInterval(poll, 1000);
      }

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = messageInput.value.trim();
        if (!text) return;

        appendMessage("user", text);
        messageInput.value = "";

        const path = pendingFollowupRequestId ? "/api/followup" : "/api/chat";
        const payload = pendingFollowupRequestId
          ? { request_id: pendingFollowupRequestId, message: text }
          : { message: text };

        const res = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) {
          appendMessage("assistant", data.error || "Request failed");
          return;
        }

        currentRequestId = data.request_id;
        currentTaskId = data.delegated_task_id || null;

        appendMessage(
          "assistant",
          data.message,
          `route=${data.route} request_id=${data.request_id}${data.delegated_task_id ? ` task_id=${data.delegated_task_id}` : ""}`,
        );

        pendingFollowupRequestId = data.waiting_input ? data.request_id : null;
        messageInput.placeholder = pendingFollowupRequestId
          ? "Provide clarification requested by Chanakya..."
          : "Ask Chanakya anything...";

        if (data.task) {
          renderTask(data.task);
        }

        startPolling();
      });

      appendMessage(
        "assistant",
        "Hi, I am Chanakya. Ask a direct question, weather query, or delegated implementation request.",
      );
    </script>
  </body>
</html>
